name: Build Ultimate VPS Manager APK

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'کد نسخه'
        required: false
        default: '1'
      version_name:
        description: 'نام نسخه'
        required: false
        default: '1.0.0'

jobs:
  build_ultimate_apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🛠️ Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 📦 Install Android SDK
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip openjdk-17-jdk
        
        # دانلود Android SDK Command Line Tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mkdir -p android-sdk/cmdline-tools
        mv cmdline-tools android-sdk/cmdline-tools/latest
        
        export ANDROID_SDK_ROOT=$(pwd)/android-sdk
        export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
        
        # نصب build-tools
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        sdkmanager "build-tools;34.0.0" "platforms;android-34"
        
        # ایجاد symlink برای دسترسی آسان
        sudo ln -sf $ANDROID_SDK_ROOT/build-tools/34.0.0/aapt2 /usr/bin/aapt2
        sudo ln -sf $ANDROID_SDK_ROOT/build-tools/34.0.0/d8 /usr/bin/d8
        sudo ln -sf $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner /usr/bin/apksigner
        
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
        echo "$ANDROID_SDK_ROOT/build-tools/34.0.0" >> $GITHUB_PATH

    - name: 📥 Download JSON library
      run: |
        mkdir -p app/libs
        wget -q -O app/libs/json.jar https://repo1.maven.org/maven2/org/json/json/20230227/json-20230227.jar

    - name: 🏗️ Create project files
      run: |
        mkdir -p app/src/main/java/com/vps/manager
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        
        # AndroidManifest.xml
        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.vps.manager">
            <uses-permission android:name="android.permission.INTERNET" />
            <application android:label="⚡ VPS One-Click">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        
        # activity_main.xml
        cat > app/src/main/res/layout/activity_main.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:orientation="vertical"
            android:padding="20dp"
            android:gravity="center_horizontal"
            android:background="#0D1117">
            
            <TextView
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="🚀 VPS One-Click"
                android:textSize="28sp"
                android:textStyle="bold"
                android:textColor="#F0F6FC"
                android:layout_marginBottom="30dp"/>
            
            <EditText
                android:id="@+id/tokenInput"
                android:layout_width="match_parent"
                android:layout_height="56dp"
                android:hint="🔑 توکن گیت‌هاب را وارد کنید"
                android:inputType="textPassword"
                android:textColor="#F0F6FC"
                android:textColorHint="#8B949E"
                android:background="#161B22"
                android:padding="12dp"
                android:layout_marginBottom="16dp"/>
            
            <Button
                android:id="@+id/oneClickBtn"
                android:layout_width="match_parent"
                android:layout_height="60dp"
                android:text="⚡ یک‌کلیک VPS"
                android:textSize="18sp"
                android:textStyle="bold"
                android:textColor="#FFFFFF"
                android:background="#2EA043"
                android:layout_marginBottom="16dp"/>
            
            <TextView
                android:id="@+id/statusText"
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:text="⏳ آماده برای شروع..."
                android:textColor="#8B949E"
                android:padding="12dp"
                android:background="#161B22"
                android:layout_marginBottom="8dp"/>
            
            <TextView
                android:id="@+id/resultText"
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:text=""
                android:textColor="#F0F6FC"
                android:padding="12dp"
                android:background="#161B22"/>
            
            <Button
                android:id="@+id/copyBtn"
                android:layout_width="match_parent"
                android:layout_height="48dp"
                android:text="📋 کپی لینک SSH"
                android:textColor="#FFFFFF"
                android:background="#30363D"
                android:visibility="gone"/>
        </LinearLayout>
        EOF
        
        # MainActivity.java
        cat > app/src/main/java/com/vps/manager/MainActivity.java << 'EOF'
        package com.vps.manager;
        
        import android.app.Activity;
        import android.content.ClipData;
        import android.content.ClipboardManager;
        import android.content.Context;
        import android.os.Bundle;
        import android.os.Handler;
        import android.os.Looper;
        import android.view.View;
        import android.widget.Button;
        import android.widget.EditText;
        import android.widget.TextView;
        import android.widget.Toast;
        import org.json.JSONObject;
        import java.io.BufferedReader;
        import java.io.DataOutputStream;
        import java.io.InputStreamReader;
        import java.net.HttpURLConnection;
        import java.net.URL;
        import java.util.concurrent.ExecutorService;
        import java.util.concurrent.Executors;
        
        public class MainActivity extends Activity {
            private EditText tokenInput;
            private TextView statusText, resultText;
            private Button copyBtn;
            private ExecutorService executor = Executors.newSingleThreadExecutor();
            private Handler mainHandler = new Handler(Looper.getMainLooper());
            private String currentSSH = "";
        
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);
                tokenInput = findViewById(R.id.tokenInput);
                statusText = findViewById(R.id.statusText);
                resultText = findViewById(R.id.resultText);
                copyBtn = findViewById(R.id.copyBtn);
                findViewById(R.id.oneClickBtn).setOnClickListener(v -> startOneClick());
                copyBtn.setOnClickListener(v -> copySSH());
            }
        
            private void startOneClick() {
                String token = tokenInput.getText().toString().trim();
                if (token.isEmpty()) {
                    showToast("لطفاً توکن را وارد کنید");
                    return;
                }
                statusText.setText("⚡ شروع فرآیند یک‌کلیک...");
                resultText.setText("");
                copyBtn.setVisibility(View.GONE);
                
                executor.execute(() -> {
                    try {
                        String repoName = "VPS-" + System.currentTimeMillis() / 1000;
                        mainHandler.post(() -> statusText.setText("📁 ایجاد مخزن: " + repoName));
                        String repo = createRepo(token, repoName);
                        
                        mainHandler.post(() -> statusText.setText("📂 ایجاد workflow..."));
                        createWorkflow(token, repo);
                        
                        mainHandler.post(() -> statusText.setText("🚀 اجرای VPS..."));
                        String ssh = runWorkflow(token, repo);
                        
                        mainHandler.post(() -> {
                            statusText.setText("✅ VPS آماده است! 🎉");
                            resultText.setText("🔑 لینک اتصال SSH:\n\n" + ssh);
                            currentSSH = ssh;
                            copyBtn.setVisibility(View.VISIBLE);
                        });
                    } catch (Exception e) {
                        mainHandler.post(() -> statusText.setText("❌ خطا: " + e.getMessage()));
                    }
                });
            }
        
            private String createRepo(String token, String name) throws Exception {
                URL url = new URL("https://api.github.com/user/repos");
                HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                conn.setRequestMethod("POST");
                conn.setRequestProperty("Authorization", "token " + token);
                conn.setRequestProperty("Content-Type", "application/json");
                conn.setDoOutput(true);
                String json = "{\"name\":\"" + name + "\",\"private\":false}";
                DataOutputStream wr = new DataOutputStream(conn.getOutputStream());
                wr.writeBytes(json);
                wr.flush();
                wr.close();
                if (conn.getResponseCode() == 201) {
                    String response = readResponse(conn);
                    return new JSONObject(response).getString("full_name");
                } else {
                    throw new Exception("خطا در ایجاد مخزن: " + conn.getResponseCode());
                }
            }
        
            private void createWorkflow(String token, String repo) throws Exception {
                String workflow = "name: VPS Creator\non:\n  workflow_dispatch:\njobs:\n  vps:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout\n        uses: actions/checkout@v4\n      - name: Start tmate\n        uses: mxschmitt/action-tmate@v3";
                String encoded = android.util.Base64.encodeToString(workflow.getBytes(), android.util.Base64.NO_WRAP);
                URL url = new URL("https://api.github.com/repos/" + repo + "/contents/.github/workflows/vps.yml");
                HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                conn.setRequestMethod("PUT");
                conn.setRequestProperty("Authorization", "token " + token);
                conn.setRequestProperty("Content-Type", "application/json");
                conn.setDoOutput(true);
                String json = "{\"message\":\"Add VPS workflow\",\"content\":\"" + encoded + "\"}";
                DataOutputStream wr = new DataOutputStream(conn.getOutputStream());
                wr.writeBytes(json);
                wr.flush();
                wr.close();
                int code = conn.getResponseCode();
                if (code != 201 && code != 200) {
                    throw new Exception("خطا در ایجاد workflow: " + code);
                }
            }
        
            private String runWorkflow(String token, String repo) throws Exception {
                URL url = new URL("https://api.github.com/repos/" + repo + "/actions/workflows/vps.yml/dispatches");
                HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                conn.setRequestMethod("POST");
                conn.setRequestProperty("Authorization", "token " + token);
                conn.setRequestProperty("Content-Type", "application/json");
                conn.setDoOutput(true);
                String json = "{\"ref\":\"main\"}";
                DataOutputStream wr = new DataOutputStream(conn.getOutputStream());
                wr.writeBytes(json);
                wr.flush();
                wr.close();
                if (conn.getResponseCode() == 204) {
                    return "✅ VPS workflow با موفقیت اجرا شد!\n📋 لینک SSH در لاگ‌های Actions ظاهر می‌شود.\n🔗 مخزن: " + repo;
                } else {
                    throw new Exception("خطا در اجرای workflow: " + conn.getResponseCode());
                }
            }
        
            private String readResponse(HttpURLConnection conn) throws Exception {
                BufferedReader br = new BufferedReader(new InputStreamReader(conn.getInputStream()));
                StringBuilder sb = new StringBuilder();
                String line;
                while ((line = br.readLine()) != null) sb.append(line);
                br.close();
                return sb.toString();
            }
        
            private void copySSH() {
                ClipboardManager clipboard = (ClipboardManager) getSystemService(Context.CLIPBOARD_SERVICE);
                ClipData clip = ClipData.newPlainText("SSH", currentSSH);
                clipboard.setPrimaryClip(clip);
                showToast("📋 لینک SSH کپی شد!");
            }
        
            private void showToast(String msg) {
                mainHandler.post(() -> Toast.makeText(this, msg, Toast.LENGTH_LONG).show());
            }
        }
        EOF

    - name: 🏗️ Build APK
      run: |
        export ANDROID_SDK_ROOT=$(pwd)/android-sdk
        export PATH=$PATH:$ANDROID_SDK_ROOT/build-tools/34.0.0:$ANDROID_SDK_ROOT/platform-tools
        
        mkdir -p build/classes build/dex build/resources build/apk
        
        # کامپایل جاوا
        javac -d build/classes -cp "app/libs/*:$ANDROID_SDK_ROOT/platforms/android-34/android.jar" $(find app/src/main/java -name "*.java")
        
        # تبدیل به DEX
        d8 --lib $ANDROID_SDK_ROOT/platforms/android-34/android.jar --output build/dex --min-api 21 build/classes/**/*.class
        
        # کامپایل منابع
        aapt2 compile --dir app/src/main/res -o build/resources/
        aapt2 link -I $ANDROID_SDK_ROOT/platforms/android-34/android.jar --manifest app/src/main/AndroidManifest.xml -o build/apk/app.apk build/resources/*.flat
        
        # اضافه کردن DEX
        zip -j build/apk/app.apk build/dex/*.dex
        
        # امضا
        keytool -genkey -v -keystore debug.keystore -alias debug -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Debug" -noprompt
        apksigner sign --ks debug.keystore --ks-pass pass:android --out VPS-OneClick.apk build/apk/app.apk

    - name: 📤 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: VPS-OneClick
        path: VPS-OneClick.apk
        retention-days: 30
